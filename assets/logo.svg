<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Container gradient -->
    <linearGradient id="containerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <!-- Crab body gradient -->
    <linearGradient id="crabGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be123c;stop-opacity:1" />
    </linearGradient>
    <!-- Claw gradient -->
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb7185;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e11d48;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#0f0f23" stroke="#7c3aed" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Container Box -->
  <rect x="24" y="34" width="80" height="60" rx="10" ry="10" 
        fill="url(#containerGrad)" filter="url(#glow)"/>
  
  <!-- Container Details (lines) -->
  <rect x="32" y="44" width="50" height="3" rx="1.5" fill="rgba(255,255,255,0.7)"/>
  <rect x="32" y="52" width="40" height="3" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="32" y="60" width="45" height="3" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="32" y="68" width="35" height="3" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  
  <!-- Status Indicator (green dot) -->
  <circle cx="92" cy="82" r="5" fill="#22c55e"/>
  
  <!-- Krabby (Rust Crab/Ferris) overlay -->
  <g transform="translate(75, 68) scale(0.28)">
    <!-- Left Claw -->
    <path d="M-60 10 Q-80 -10 -75 -35 Q-70 -50 -55 -35 Q-50 -25 -52 0" 
          fill="url(#clawGrad)" stroke="#9f1239" stroke-width="3"/>
    
    <!-- Right Claw -->
    <path d="M60 10 Q80 -10 75 -35 Q70 -50 55 -35 Q50 -25 52 0" 
          fill="url(#clawGrad)" stroke="#9f1239" stroke-width="3"/>
    
    <!-- Body -->
    <ellipse cx="0" cy="25" rx="50" ry="40" fill="url(#crabGrad)"/>
    
    <!-- Head -->
    <circle cx="0" cy="-15" rx="32" ry="30" fill="url(#crabGrad)"/>
    
    <!-- Eyes -->
    <circle cx="-16" cy="-38" r="10" fill="url(#crabGrad)"/>
    <circle cx="16" cy="-38" r="10" fill="url(#crabGrad)"/>
    <circle cx="-16" cy="-38" r="4" fill="white"/>
    <circle cx="16" cy="-38" r="4" fill="white"/>
    <circle cx="-16" cy="-38" r="2" fill="black"/>
    <circle cx="16" cy="-38" r="2" fill="black"/>
    
    <!-- Legs -->
    <path d="M-40 55 Q-55 75 -50 90" fill="none" stroke="url(#crabGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M-20 62 Q-30 80 -25 95" fill="none" stroke="url(#crabGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M20 62 Q30 80 25 95" fill="none" stroke="url(#crabGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M40 55 Q55 75 50 90" fill="none" stroke="url(#crabGrad)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Smile -->
    <path d="M-15 10 Q0 20 15 10" fill="none" stroke="#881337" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
