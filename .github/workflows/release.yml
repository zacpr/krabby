name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: krabby-linux-x64

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libxapp-dev pkg-config libdbus-1-dev

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build Release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package
      run: |
        mkdir -p dist
        cp target/${{ matrix.target }}/release/krabby dist/
        cp -r assets dist/ 2>/dev/null || true
        cp README.md dist/ 2>/dev/null || true
        tar czf ${{ matrix.name }}.tar.gz -C dist .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: ${{ matrix.name }}.tar.gz

  build-rpm:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-generate-rpm
      run: cargo install cargo-generate-rpm

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libxapp-dev pkg-config rpm libdbus-1-dev

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build Release
      run: cargo build --release

    - name: Build RPM
      run: cargo generate-rpm

    - name: Rename RPM
      run: |
        RPM_FILE=$(find ./target/generate-rpm -name "*.rpm" | head -n 1)
        cp "$RPM_FILE" krabby-${{ github.ref_name }}-1.x86_64.rpm

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: krabby-rpm
        path: krabby-${{ github.ref_name }}-1.x86_64.rpm

  build-deb:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-deb
      run: cargo install cargo-deb

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libxapp-dev pkg-config libdbus-1-dev

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build Release
      run: cargo build --release

    - name: Build DEB
      run: cargo deb

    - name: Rename DEB
      run: |
        DEB_FILE=$(find ./target/debian -name "*.deb" | head -n 1)
        cp "$DEB_FILE" krabby-${{ github.ref_name }}-1_amd64.deb

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: krabby-deb
        path: krabby-${{ github.ref_name }}-1_amd64.deb

  create-release:
    needs: [build-release, build-rpm, build-deb]
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: List artifacts
      run: ls -la artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
